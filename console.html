<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Orka Console | Player</title>
    
    <link rel="stylesheet" href="core/orka-base.css">
    <link id="favicon" rel="icon" type="image/png" href="assets/icons/orka-logo.png">
    <link rel="stylesheet" href="styles.css"> 
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root { 
            --safe-top: env(safe-area-inset-top); 
            --orka-accent-rgb: 0, 85, 255;
        }

        body {
            overflow-y: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #050505;
            padding-top: var(--safe-top);
            touch-action: pan-x pan-y; /* Permite scroll mas evita gestos de zoom */
            overscroll-behavior: none;
        }

        .console-container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* justify-content: center;
            padding: 20px; */
            box-sizing: border-box;
            justify-content: flex-start; 
            padding: 0; /* Tiramos o padding lateral para expandir ao máximo */
        }

        /* Container do Iframe (Mix de Visual 1 com Melhorias do 2) */
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 1200px; /* Permite ficar bem largo no PC */
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 12px;
            border: none;/*2px solid var(--orka-border);*/
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            overflow: hidden;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .game-wrapper.fullscreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            max-width: none;
            z-index: 9999;
            border-radius: 0;
            border: none;
        }

        iframe ::-webkit-scrollbar {
            display: none; /* Esconde a scrollbar do iframe para uma aparência mais limpa */
        }
        .console-container ::-webkit-scrollbar {
            display: none; /* Esconde a scrollbar do iframe para uma aparência mais limpa */
        }
        .game-wrapper ::-webkit-scrollbar {
            display: none; /* Esconde a scrollbar do iframe para uma aparência mais limpa */
        }

        iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
        }

        /* Loader Customizado (Arquivo 2) */
        #game-loader {
            position: absolute; 
            top:0; left:0; width:100%; height:100%;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: #050505; 
            z-index: 5; 
            transition: opacity 0.5s ease;
        }

        /* Controles Inferiores */
        .console-controls {
            width: 100%;
            max-width: 940px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 10px;
        }

        .game-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .game-info img {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Botão Flutuante (Arquivo 2) *//* Botão Flutuante de Saída (Discreto no Canto Inferior Direito) */
        #fs-exit-btn {
            position: fixed; 
            bottom: 20px; /* Posicionado embaixo */
            right: 20px;  /* Posicionado à direita */
            z-index: 2147483647; /* Valor máximo para sobrepor QUALQUER coisa */
            background: rgba(0, 0, 0, 0.4);
            color: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%; 
            display: none; /* Ativado via JS */
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px); 
            pointer-events: auto; /* Garante que o clique funcione */
            opacity: 0.5;
            pointer-events: auto; 
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        #fs-exit-btn.visible { 
            display: flex; 
        }

        /* Feedback visual ao tocar no botão */
        #fs-exit-btn:active { 
            transform: scale(0.9); 
            opacity: 0.9;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
        }

        /* Esconder o ícone nativo de fullscreen no mobile se estiver atrapalhando */
        iframe::-webkit-media-controls-fullscreen-button {
            display: none;
        }

        /* Estilo dos Botões de Ação (Arquivo 2) */
        .actions-group { display: flex; gap: 10px; }
        
        .btn-console {
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1);
            color: #eee; padding: 8px 16px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px; 
            cursor: pointer; transition: all 0.2s ease; font-weight: 600;
        }
        .btn-console:hover { border-color: var(--orka-accent); background: rgba(0,85,255,0.15); }
        .btn-console.active { color:  var(--orka-accent); border-color: var(--orka-accent); background: rgba(89, 164, 255, 0.1); }
        
        .btn-danger { color: #ff4444; border-color: rgba(255, 68, 68, 0.3); }

        /* Ajustes Mobile */
        @media (max-width: 768px) {
            .game-wrapper.portrait-mode {
                aspect-ratio: 9 / 16;
                max-width: 97vw;
            }
            .action-text { display: none; }
            .btn-console { padding: 10px; border-radius: 50%; }
        }

        .console-header {

        } */

        /* Animação de pulo do coração */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .heart-pop {
            animation: heartBeat 0.4s ease-out;
            color: #1447ff !important; /* Cor de destaque ao pulsar */
        }

        /* Transição suave para o contador */
        #like-count {
            transition: all 0.2s ease;
            display: inline-block;
        }

<script type="module">
    // Importações do Arquivo 2
    import { OrkaCloud } from './core/orka-cloud.js';
    import { OrkaFX } from './core/orka-lib.js';
    import { OrkaAdsManager } from './core/orka-ads.js';

    const params = new URLSearchParams(window.location.search);
    const gameId = params.get('id');
    let currentLikes = 0; // Resolvendo o ReferenceError
    let isLiked = false;

    const gameUrl = params.get('url');
    const gameTitle = params.get('title') || "ORKA GAME";
    const gameDev = params.get('dev') || "Orka Studio";
    const allowPortrait = params.get('portrait') === 'true';

    const wrapper = document.getElementById('master-wrapper');
    const iframe = document.getElementById('game-iframe');
    const loader = document.getElementById('game-loader');
    const favicon = document.getElementById('favicon');

    // --- INICIALIZAÇÃO DE INTERFACE (Visual do Arq 1) ---
    document.getElementById('game-title-display').textContent = gameTitle.toUpperCase();
    document.getElementById('game-name').textContent = gameTitle;
    document.getElementById('game-dev').textContent = gameDev;
    document.title = `${gameTitle} | Orka Console`;
    
    const gameIconPath = `assets/icons/${gameId}-logo.png`;
    if (favicon) favicon.href = gameIconPath;
    document.getElementById('game-icon').src = gameIconPath;

    if (allowPortrait) wrapper.classList.add('portrait-mode');

    // --- LÓGICA DE CARREGAMENTO ---
    if (gameUrl) {
        iframe.src = gameUrl;
        iframe.onload = () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 400);
        };
    }

async function syncProfile() {
    // 1. Identifica o usuário (Sempre o primeiro passo)
    await OrkaCloud.initAuth();
    
    const user = OrkaCloud.getUser();
    const gameId = params.get('id');

    // BUSCAR TOTAL DE LIKES
    const supabase = OrkaCloud.getClient();
    const { count, error } = await supabase
        .from('game_likes')
        .select('*', { count: 'exact', head: true })
        .eq('game_id', gameId);

    if (!error) {
        currentLikes = count || 0;
        updateLikeUI(currentLikes);
    }

    // VERIFICAR SE O USUÁRIO LOGADO JÁ CURTIU
    if (user) {

        // 🚀 A MÁGICA ACONTECE AQUI:
        // O Console inicia os batimentos cardíacos para este jogo específico.
        // Se o usuário fechar a aba, o OrkaCloud para de pulsar automaticamente.
        OrkaCloud.startHeartbeatSession(gameId);

        const { data: userLike } = await supabase
            .from('game_likes')
            .select('id')
            .eq('user_id', user.id)
            .eq('game_id', gameId)
            .maybeSingle();

        if (userLike) {
            isLiked = true;
            document.getElementById('btn-like').classList.add('active');
            document.getElementById('btn-like').querySelector('.material-icons').textContent = 'favorite';
        }
    }

    const profile = OrkaCloud.getProfile();

    if (user && profile) {
        const badge = document.getElementById('user-badge');
        const nick = document.getElementById('user-nick');
        const avatar = document.getElementById('user-avatar');

        if(badge) badge.style.display = 'flex';
        
        // Prioridade: Display Name > Nickname > Email (antes do @)
        if(nick) {
            nick.textContent = profile.display_name || profile.nickname || user.email.split('@')[0];
        }
        
        if(avatar && profile.profile_image) {
            avatar.src = `assets/avatars/${profile.profile_image}.png`;
        }
    }
}

// Chama assim que o DOM carregar
syncProfile();

import { gamesList } from './games.js';

async function loadGameMetadata(gameId) {
    const game = gamesList.find(g => g.id === gameId);
    if (!game) return;
    
    // --- SEÇÃO DE INFLUENCIADORES COM FETCH DO BANCO ---
    if (game.influencers && game.influencers.length > 0) {
        const influencersSection = document.getElementById('influencers-section');
        const list = document.getElementById('influencers-list');
        
        // 1. Pegamos apenas os IDs dos influenciadores listados no games.js
        const influencerIds = game.influencers.map(inf => inf.id);

        try {
            const supabase = OrkaCloud.getClient();
            
            // 2. Buscamos no banco os dados reais (nickname e profile_image)
            const { data: profiles, error } = await supabase
                .from('players')
                .select('id, nickname, profile_image')
                .in('id', influencerIds);

            if (error) throw error;

            if (profiles && profiles.length > 0) {
                influencersSection.style.display = 'block';
                
                // 3. Cruzamos os dados do Banco com o Link do Canal do games.js
                list.innerHTML = profiles.map(profile => {
                    const config = game.influencers.find(inf => inf.id === profile.id);
                    const avatarUrl = `assets/avatars/${profile.profile_image || 'default'}.png`;
                    
                    //abrir o canal do influenciador em uma nova aba limpa, sem permanecer nas dependências do site
                    return ` 
                        <div class="influencer-card" onclick="window.open('${config.channel}', '_blank')"> 
                            <img src="${avatarUrl}" alt="${profile.nickname}">
                            <span>${profile.nickname}</span>
                        </div>
                    `;
                }).join('');
            }
        } catch (err) {
            console.error("Erro ao carregar influenciadores:", err);
        }
    }

    // Descrição
    if (game && game.description) {
        document.getElementById('dev-info-section').style.display = 'block';
        document.getElementById('game-description-text').innerHTML = game.description;
    }
}

// Chame ao carregar:
loadGameMetadata(gameId);

function updateLikeUI(count, active) {
    const counterDisplay = document.getElementById('like-count');
    const likeBtn = document.getElementById('btn-like');
    
    if (counterDisplay) counterDisplay.textContent = count;
    
    if (likeBtn) {
        const icon = likeBtn.querySelector('.material-icons');
        if (active) {
            likeBtn.classList.add('active');
            if (icon) icon.textContent = 'favorite';
        } else {
            likeBtn.classList.remove('active');
            if (icon) icon.textContent = 'favorite_border';
        }
    }
}

// --- SISTEMA DE CURTIDAS ---
const likeBtn = document.getElementById('btn-like');

    async function toggleLike() {
        const user = OrkaCloud.getUser();
        if (!user) {
            OrkaFX.toast("Logue para curtir! 🚀", "info");
            return;
        }

        const supabase = OrkaCloud.getClient();
        const likeBtn = document.getElementById('btn-like');
        const icon = likeBtn.querySelector('.material-icons');

        if (!isLiked) {
            // --- AÇÃO: CURTIR ---
            isLiked = true; 
            currentLikes++;
            updateLikeUI(currentLikes, true);
            
            // Adiciona animação de pulo
            icon.classList.add('heart-pop');
            setTimeout(() => icon.classList.remove('heart-pop'), 400);

            const { error } = await supabase.from('game_likes').insert({ 
                user_id: user.id, 
                game_id: gameId 
            });

            if (error && error.code !== '23505') {
                isLiked = false;
                currentLikes--;
                updateLikeUI(currentLikes, false);
            }
        } else {
            // --- AÇÃO: REMOVER LIKE ---
            isLiked = false;
            currentLikes--; // Agora o contador diminui na interface
            updateLikeUI(currentLikes, false);

            const { error } = await supabase.from('game_likes')
                .delete()
                .eq('user_id', user.id)
                .eq('game_id', gameId);

            if (error) {
                isLiked = true;
                currentLikes++;
                updateLikeUI(currentLikes, true);
            }
        }
    }
    likeBtn.onclick = toggleLike;

    // --- COMPARTILHAMENTO (Arquivo 2) ---
    document.getElementById('btn-share').onclick = async () => {
        try {
            if (navigator.share) {
                await navigator.share({
                    title: gameTitle,
                    text: `Olha esse jogo no Orka Hub:`,
                    url: window.location.href
                });
            } else {
                await navigator.clipboard.writeText(window.location.href);
                OrkaFX.toast("Link copiado!", "success");
            }
        } catch (err) { console.warn(err) }
    };

    // --- LÓGICA DE TELA CHEIA ---
    const btnFullscreen = document.getElementById('btn-fullscreen');
    const fsExitBtn = document.getElementById('fs-exit-btn');

    const toggleFS = () => {
        if (!document.fullscreenElement) {
            wrapper.requestFullscreen().catch(err => console.error(err));
        } else {
            document.exitFullscreen();
        }
    };

    btnFullscreen.onclick = toggleFS;
    fsExitBtn.onclick = toggleFS;

    document.addEventListener('fullscreenchange', () => {
        const isFS = !!document.fullscreenElement;
        const icon = btnFullscreen.querySelector('.material-icons');
        
        icon.textContent = isFS ? 'fullscreen_exit' : 'fullscreen';
        wrapper.classList.toggle('fullscreen', isFS);
        
        if (isFS) {
            fsExitBtn.classList.add('visible');
        } else {
            fsExitBtn.classList.remove('visible');
        }
    });

    // Prevenção de gestos
    document.addEventListener('touchmove', (e) => {
        if (e.scale !== 1) e.preventDefault();
    }, { passive: false });
</script>
</body>
</html>
